<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOL Intelligence — Sign In</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230d1b2a'/%3E%3Ccircle cx='32' cy='32' r='26' fill='none' stroke='%231e3a5f' stroke-width='1.5'/%3E%3Ccircle cx='32' cy='32' r='18' fill='none' stroke='%231e4d8c' stroke-width='1.5'/%3E%3Ccircle cx='32' cy='32' r='10' fill='none' stroke='%232563eb' stroke-width='1.5'/%3E%3Cpath d='M32 32 L52 20' stroke='%2358a6ff' stroke-width='2' stroke-linecap='round' opacity='0.7'/%3E%3Ccircle cx='32' cy='32' r='3.5' fill='%2358a6ff'/%3E%3Cpath d='M6 32 A26 26 0 0 1 32 6' fill='none' stroke='%23f59e0b' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #f6f8fa;
  --surface:  #ffffff;
  --surface2: #f0f2f5;
  --border:   #d0d7de;
  --border2:  #b0b7bf;
  --text:     #1f2328;
  --muted:    #656d76;
  --accent:   #0969da;
  --accent2:  #0550ae;
  --red:      #cf222e;
  --red-bg:   #ffebe9;
  --green:    #1a7f37;
  --green-bg: #dafbe1;
  --radius:   8px;
  --radius-lg:12px;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
/* Subtle grid background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.35;
  pointer-events: none;
  z-index: 0;
}
.card {
  position: relative; z-index: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 36px 32px 28px;
  width: 100%; max-width: 420px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.08);
}
/* Logo */
.logo {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 28px; text-align: center;
}
.logo-icon {
  width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
  filter: drop-shadow(0 4px 14px rgba(37, 99, 235, 0.4));
}
.logo-title { font-size: 20px; font-weight: 700; color: var(--text); }
.logo-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; }
/* Tab bar */
.tab-bar {
  display: flex; gap: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.tab-btn {
  flex: 1; padding: 9px 16px;
  font-size: 13px; font-weight: 500;
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  transition: all .15s; font-family: inherit;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: var(--accent2); color: #fff; }
/* Form */
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 5px; font-weight: 500;
}
.form-group input {
  width: 100%; padding: 9px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text); font-size: 13px;
  font-family: inherit; outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(9,105,218,.12);
}
/* Submit button */
.btn-submit {
  width: 100%; padding: 11px;
  background: var(--accent2); border: 1px solid var(--accent);
  color: #fff; border-radius: var(--radius);
  font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: background .15s, transform .1s;
  margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-submit:hover  { background: #388bfd; }
.btn-submit:active { transform: translateY(1px); }
.btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
/* Message banner */
.msg {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px; margin-bottom: 16px;
  display: none; line-height: 1.5;
}
.msg-err { background: var(--red-bg); border: 1px solid rgba(207,34,46,.3); color: var(--red); }
.msg-ok  { background: var(--green-bg); border: 1px solid rgba(26,127,55,.3); color: var(--green); }
/* Password strength bar */
.pwd-strength-wrap { margin-top: 5px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.pwd-strength-fill  { height: 100%; border-radius: 2px; width: 0; transition: width .3s, background .3s; }
/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin .7s linear infinite; }
/* Divider */
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0 16px; }
/* Footer */
.card-footer { text-align: center; font-size: 11px; color: var(--muted); line-height: 1.6; }
.card-footer strong { color: var(--text); }
/* Note about first user */
.first-user-note {
  font-size: 11px; color: var(--muted); text-align: center;
  margin-top: 12px; padding: 8px 12px;
  background: rgba(9,105,218,.06); border-radius: var(--radius);
  border: 1px solid rgba(9,105,218,.15);
  display: none;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon" style="background:none;padding:0;">
      <svg width="56" height="56" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#0d1b2a"/>
        <circle cx="32" cy="32" r="26" stroke="#1e3a5f" stroke-width="1.8"/>
        <circle cx="32" cy="32" r="18" stroke="#1e4d8c" stroke-width="1.8"/>
        <circle cx="32" cy="32" r="10" stroke="#2563eb" stroke-width="1.8"/>
        <line x1="32" y1="32" x2="52" y2="20" stroke="#58a6ff" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
        <line x1="32" y1="32" x2="55" y2="28" stroke="#58a6ff" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
        <circle cx="32" cy="32" r="3.5" fill="#58a6ff"/>
        <path d="M6 32 A26 26 0 0 1 18.7 11" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="44" cy="20" r="2.5" fill="#f59e0b" opacity="0.9"/>
      </svg>
    </div>
    <div class="logo-title">EOL Intelligence</div>
    <div class="logo-sub">Network Lifecycle Agent v1.0</div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn"        id="tab-register" onclick="switchTab('register')">Create Account</button>
    <button class="tab-btn"        id="tab-forgot"   onclick="switchTab('forgot')">Reset Password</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- ── Sign In ── -->
  <div id="form-login">
    <div class="form-group">
      <label>Username</label>
      <input id="login-user" type="text" placeholder="Enter your username"
             autocomplete="username" autofocus
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="login-pwd" type="password" placeholder="••••••••"
             autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin:10px 0 4px;">
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;">
        <input type="checkbox" id="login-remember" style="width:14px;height:14px;accent-color:var(--accent);cursor:pointer;">
        Remember me
      </label>
      <button type="button" onclick="switchTab('forgot')"
        style="background:none;border:none;font-size:12px;color:var(--accent);cursor:pointer;padding:0;font-family:inherit;">
        Forgot password?
      </button>
    </div>
    <button class="btn-submit" id="btn-login" onclick="doLogin()">
      <span id="login-spinner"></span>
      Sign In →
    </button>
  </div>

  <!-- ── Create Account ── -->
  <div id="form-register" style="display:none">
    <div class="form-group">
      <label>Username <span style="color:var(--red)">*</span></label>
      <input id="reg-user" type="text" placeholder="3+ chars, letters/numbers/- _"
             autocomplete="username"
             onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <div class="form-group">
      <label>Email <span style="color:var(--muted)">(optional)</span></label>
      <input id="reg-email" type="email" placeholder="you@example.com"
             autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password <span style="color:var(--red)">*</span> <span style="color:var(--muted);font-size:10px;">(6+ characters)</span></label>
      <input id="reg-pwd" type="password" placeholder="Choose a strong password"
             autocomplete="new-password"
             oninput="checkStrength(this.value)"
             onkeydown="if(event.key==='Enter')doRegister()">
      <div class="pwd-strength-wrap">
        <div class="pwd-strength-fill" id="pwd-bar"></div>
      </div>
    </div>
    <div class="form-group">
      <label>Confirm Password <span style="color:var(--red)">*</span></label>
      <input id="reg-pwd2" type="password" placeholder="Repeat password"
             autocomplete="new-password"
             onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <button class="btn-submit" id="btn-register" onclick="doRegister()">
      <span id="reg-spinner"></span>
      Create Account →
    </button>
    <div class="first-user-note" id="first-user-note">
      No accounts yet — the first registered user becomes <strong>Admin</strong>.
    </div>
  </div>

  <!-- ── Reset Password ── -->
  <div id="form-forgot" style="display:none">
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5;">
      Enter your username and choose a new password below.
    </p>
    <div class="form-group">
      <label>Username <span style="color:var(--red)">*</span></label>
      <input id="forgot-user" type="text" placeholder="Your username"
             autocomplete="username"
             onkeydown="if(event.key==='Enter')doResetPassword()">
    </div>
    <div class="form-group">
      <label>New Password <span style="color:var(--red)">*</span> <span style="color:var(--muted);font-size:10px;">(6+ characters)</span></label>
      <input id="forgot-pwd" type="password" placeholder="Choose a new password"
             autocomplete="new-password"
             oninput="checkStrength2(this.value)"
             onkeydown="if(event.key==='Enter')doResetPassword()">
      <div class="pwd-strength-wrap">
        <div class="pwd-strength-fill" id="pwd-bar2"></div>
      </div>
    </div>
    <div class="form-group">
      <label>Confirm New Password <span style="color:var(--red)">*</span></label>
      <input id="forgot-pwd2" type="password" placeholder="Repeat new password"
             autocomplete="new-password"
             onkeydown="if(event.key==='Enter')doResetPassword()">
    </div>
    <button class="btn-submit" id="btn-forgot" onclick="doResetPassword()">
      <span id="forgot-spinner"></span>
      Reset Password →
    </button>
  </div>

  <hr class="divider">
  <div class="card-footer">
    <strong>v1.0</strong> · 9 vendor portals · SQLite cache · Multi-user
  </div>
</div>

<script>
  let _activeTab = 'login';

  // If already authenticated, go straight to app
  fetch('/api/auth/me', {credentials: 'same-origin'}).then(r => {
    if (r.ok) window.location.href = '/';
  }).catch(() => {});

  // Check if this is the first user (no accounts yet)
  fetch('/api/auth/user-count', {credentials: 'same-origin'})
    .then(r => r.json())
    .then(d => {
      if (d.count === 0) {
        document.getElementById('first-user-note').style.display = 'block';
      }
    }).catch(() => {});

  function switchTab(tab) {
    _activeTab = tab;
    document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('tab-forgot').classList.toggle('active',   tab === 'forgot');
    document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('form-forgot').style.display   = tab === 'forgot'   ? 'block' : 'none';
    hideMsg();
    const inp = tab === 'login'    ? document.getElementById('login-user')
              : tab === 'register' ? document.getElementById('reg-user')
              :                      document.getElementById('forgot-user');
    setTimeout(() => inp && inp.focus(), 50);
  }

  function showMsg(text, type = 'err') {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = 'msg msg-' + type;
    el.style.display = 'block';
  }
  function hideMsg() {
    document.getElementById('msg').style.display = 'none';
  }

  function checkStrength(pwd) {
    const bar = document.getElementById('pwd-bar');
    if (!pwd) { bar.style.width = '0'; return; }
    let score = 0;
    if (pwd.length >= 6)            score++;
    if (pwd.length >= 10)           score++;
    if (/[A-Z]/.test(pwd))          score++;
    if (/[0-9]/.test(pwd))          score++;
    if (/[^A-Za-z0-9]/.test(pwd))   score++;
    const cols = ['#f85149','#e3b341','#e3b341','#3fb950','#3fb950'];
    const pcts = [  '20%',    '40%',    '60%',    '80%',   '100%'];
    bar.style.background = cols[score - 1] || 'var(--border2)';
    bar.style.width      = pcts[score - 1] || '10%';
  }

  async function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pwd').value;
    const remember = document.getElementById('login-remember').checked;
    if (!username || !password) { showMsg('Enter your username and password.'); return; }

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    document.getElementById('login-spinner').innerHTML = '<span class="spin">⟳</span>';
    hideMsg();

    try {
      const r    = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'same-origin',
        body: JSON.stringify({username, password, remember}),
      });
      const data = await r.json();
      if (data.status === 'ok') {
        showMsg('Welcome back, ' + data.username + '!', 'ok');
        setTimeout(() => window.location.href = '/', 600);
      } else {
        showMsg(data.message || 'Login failed. Check your credentials.');
        document.getElementById('login-pwd').value = '';
        document.getElementById('login-pwd').focus();
      }
    } catch (e) {
      showMsg('Connection error — is the server running?');
    } finally {
      btn.disabled = false;
      document.getElementById('login-spinner').textContent = '';
    }
  }

  async function doRegister() {
    const username  = document.getElementById('reg-user').value.trim();
    const email     = document.getElementById('reg-email').value.trim();
    const password  = document.getElementById('reg-pwd').value;
    const password2 = document.getElementById('reg-pwd2').value;

    if (!username)             { showMsg('Username is required.'); return; }
    if (username.length < 3)   { showMsg('Username must be at least 3 characters.'); return; }
    if (!password)             { showMsg('Password is required.'); return; }
    if (password.length < 6)   { showMsg('Password must be at least 6 characters.'); return; }
    if (password !== password2) { showMsg('Passwords do not match.'); return; }

    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    document.getElementById('reg-spinner').innerHTML = '<span class="spin">⟳</span>';
    hideMsg();

    try {
      const r    = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'same-origin',
        body: JSON.stringify({username, password, email}),
      });
      const data = await r.json();
      if (data.status === 'ok') {
        const note = data.role === 'admin' ? ' (Admin — first account)' : '';
        showMsg('Account created! Welcome, ' + data.username + note, 'ok');
        setTimeout(() => window.location.href = '/', 800);
      } else {
        showMsg(data.message || 'Registration failed.');
      }
    } catch (e) {
      showMsg('Connection error — is the server running?');
    } finally {
      btn.disabled = false;
      document.getElementById('reg-spinner').textContent = '';
    }
  }
  function checkStrength2(pwd) {
    const bar = document.getElementById('pwd-bar2');
    if (!pwd) { bar.style.width = '0'; return; }
    let score = 0;
    if (pwd.length >= 6)            score++;
    if (pwd.length >= 10)           score++;
    if (/[A-Z]/.test(pwd))          score++;
    if (/[0-9]/.test(pwd))          score++;
    if (/[^A-Za-z0-9]/.test(pwd))   score++;
    const cols = ['#f85149','#e3b341','#e3b341','#3fb950','#3fb950'];
    const pcts = [  '20%',    '40%',    '60%',    '80%',   '100%'];
    bar.style.background = cols[score - 1] || 'var(--border2)';
    bar.style.width      = pcts[score - 1] || '10%';
  }

  async function doResetPassword() {
    const username  = document.getElementById('forgot-user').value.trim();
    const password  = document.getElementById('forgot-pwd').value;
    const password2 = document.getElementById('forgot-pwd2').value;

    if (!username)             { showMsg('Username is required.'); return; }
    if (!password)             { showMsg('New password is required.'); return; }
    if (password.length < 6)   { showMsg('Password must be at least 6 characters.'); return; }
    if (password !== password2) { showMsg('Passwords do not match.'); return; }

    const btn = document.getElementById('btn-forgot');
    btn.disabled = true;
    document.getElementById('forgot-spinner').innerHTML = '<span class="spin">⟳</span>';
    hideMsg();

    try {
      const r    = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'same-origin',
        body: JSON.stringify({username, new_password: password}),
      });
      const data = await r.json();
      if (data.status === 'ok') {
        showMsg(data.message, 'ok');
        document.getElementById('forgot-user').value  = '';
        document.getElementById('forgot-pwd').value   = '';
        document.getElementById('forgot-pwd2').value  = '';
        document.getElementById('pwd-bar2').style.width = '0';
        setTimeout(() => switchTab('login'), 1500);
      } else {
        showMsg(data.message || 'Reset failed. Check the username and try again.');
      }
    } catch (e) {
      showMsg('Connection error — is the server running?');
    } finally {
      btn.disabled = false;
      document.getElementById('forgot-spinner').textContent = '';
    }
  }
</script>
</body>
</html>
